apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki-tls-proxy
  namespace: perses-dev
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  selector:
    matchLabels:
      app: loki-tls-proxy
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: loki-tls-proxy
    spec:
      containers:
      - args:
        - -g
        - daemon off;
        - -c
        - /opt/config/nginx.conf
        command:
        - nginx
        image: registry.access.redhat.com/ubi9/nginx-122:latest
        name: nginx
        ports:
        - containerPort: 8080
          protocol: TCP
        resources: {}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - mountPath: /opt/config
          name: config
        - mountPath: /tmp
          name: tmp
        - mountPath: /var/cache/nginx
          name: cache
        - mountPath: /var/run
          name: run
      volumes:
      - configMap:
          defaultMode: 420
          name: loki-proxy-config
        name: config
      - emptyDir: {}
        name: tmp
      - emptyDir: {}
        name: cache
      - emptyDir: {}
        name: run
