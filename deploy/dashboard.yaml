apiVersion: perses.dev/v1alpha2
kind: PersesDashboard
metadata:
  name: ocp-user-audit-viewer
  namespace: perses-dev
spec:
  config:
    display:
      description: Kube-apiserver audit events for real users, powered by Loki
      name: OCP User Audit Viewer
    duration: 1h
    layouts:
    - kind: Grid
      spec:
        items:
        - content:
            $ref: '#/spec/panels/queryDisplay'
          height: 2
          width: 24
          x: 0
          y: 0
        - content:
            $ref: '#/spec/panels/auditEventsTable'
          height: 20
          'true': 0
          width: 24
          x: 0
          y: 4
    panels:
      auditEventsTable:
        kind: Panel
        spec:
          plugin:
            kind: LogsTable
            spec:
              enableDetails: true
              showTime: true
          queries:
          - kind: LogQuery
            spec:
              plugin:
                kind: LokiLogQuery
                spec:
                  query: "{log_type=\"audit\"}\n  | json\n  | log_source=\"kubeAPI\"\
                    \n  | user_username!~\"${exclude_sa}\"\n  | user_username=~\"\
                    (?i).*${username}.*\"\n  | verb=~\"${verb}\"\n  | objectRef_resource=~\"\
                    .*${resource}.*\"\n  | objectRef_resource!~\"${exclude_resource}\"\
                    \n  | objectRef_namespace=~\".*${namespace}.*\"\n  | objectRef_name=~\"\
                    (?i).*${resource_name}.*\"\n  | responseStatus_code=~\"${response_code}\"\
                    \n  | userAgent=~\"(?i).*${client}.*\"\n  | line_format \"User={{.user_username}}\
                    \ | Verb={{.verb}} | Namespace={{.objectRef_namespace}} | Resource={{.objectRef_resource}}\
                    \ | Resource Name={{.objectRef_name}} | Status={{.responseStatus_code}}\
                    \ | Client={{.userAgent}}\"\n  ${filter}"
      queryDisplay:
        kind: Panel
        spec:
          plugin:
            kind: Markdown
            spec:
              text: 'Active Query: `{log_type="audit"} | json | log_source="kubeAPI"
                | user_username!~"${exclude_sa}" | user_username=~"(?i).*${username}.*"
                | verb=~"${verb}" | objectRef_resource=~".*${resource}.*" | objectRef_resource!~"${exclude_resource}"
                | objectRef_namespace=~".*${namespace}.*" | objectRef_name=~"(?i).*${resource_name}.*"
                | responseStatus_code=~"${response_code}" | userAgent=~"(?i).*${client}.*"
                | line_format "User={{.user_username}} | Verb={{.verb}} | Namespace={{.objectRef_namespace}}
                | Resource={{.objectRef_resource}} | Resource Name={{.objectRef_name}}
                | Status={{.responseStatus_code}} | Client={{.userAgent}}" ${filter}`'
    refreshInterval: 0s
    variables:
    - kind: TextVariable
      spec:
        display:
          description: Filter by username (partial match, case-insensitive)
          name: Username
        name: username
        value: ''
    - kind: ListVariable
      spec:
        allowAllValue: true
        allowMultiple: true
        customAllValue: system:serviceaccount:.*|system:node:.*|system:kube.*|system:openshift.*|system:apiserver.*|system:aggregator.*|system:open-cluster-management:.*|system:ovn-node:.*|system:authenticated.*|system:unauthenticated.*|system:monitoring.*|system:master.*|system:multus.*
        defaultValue:
        - $__all
        display:
          description: Select None to show all users including system accounts
          name: Exclude System Users
        name: exclude_sa
        plugin:
          kind: StaticListVariable
          spec:
            values:
            - label: None (exclude nobody)
              value: ^$
            - label: system:serviceaccount:*
              value: system:serviceaccount:.*
            - label: system:node:*
              value: system:node:.*
            - label: system:kube-*
              value: system:kube.*
            - label: system:openshift-*
              value: system:openshift.*
            - label: system:apiserver
              value: system:apiserver.*
            - label: system:aggregator
              value: system:aggregator.*
            - label: system:open-cluster-management:*
              value: system:open-cluster-management:.*
            - label: system:ovn-node:*
              value: system:ovn-node:.*
            - label: system:authenticated
              value: system:authenticated.*
            - label: system:unauthenticated
              value: system:unauthenticated.*
            - label: system:monitoring
              value: system:monitoring.*
            - label: system:master
              value: system:master.*
            - label: system:multus:*
              value: system:multus.*
    - kind: ListVariable
      spec:
        allowAllValue: true
        allowMultiple: true
        customAllValue: .*
        defaultValue:
        - $__all
        display:
          description: Filter by API verb
          name: Verb
        name: verb
        plugin:
          kind: StaticListVariable
          spec:
            values:
            - label: create
              value: create
            - label: update
              value: update
            - label: patch
              value: patch
            - label: delete
              value: delete
            - label: get
              value: get
            - label: list
              value: list
    - kind: TextVariable
      spec:
        display:
          description: Resource type (e.g. pods, deployments)
          name: Resource
        name: resource
        value: ''
    - kind: TextVariable
      spec:
        display:
          description: Filter by namespace
          name: Namespace
        name: namespace
        value: ''
    - kind: TextVariable
      spec:
        display:
          description: Filter by resource name (partial match)
          name: Resource Name
        name: resource_name
        value: ''
    - kind: ListVariable
      spec:
        allowAllValue: true
        allowMultiple: false
        customAllValue: .*
        defaultValue:
        - $__all
        display:
          description: Filter by HTTP response code
          name: Response Code
        name: response_code
        plugin:
          kind: StaticListVariable
          spec:
            values:
            - label: '200'
              value: '200'
            - label: '201'
              value: '201'
            - label: '204'
              value: '204'
            - label: '304'
              value: '304'
            - label: '400'
              value: '400'
            - label: '401'
              value: '401'
            - label: '403'
              value: '403'
            - label: '404'
              value: '404'
            - label: '409'
              value: '409'
            - label: '422'
              value: '422'
            - label: '500'
              value: '500'
            - label: '503'
              value: '503'
    - kind: ListVariable
      spec:
        allowAllValue: true
        allowMultiple: true
        customAllValue: events|endpoints|endpointslices|leases|tokenreviews|subjectaccessreviews|selfsubjectaccessreviews|selfsubjectrulesreviews
        defaultValue:
        - $__all
        display:
          description: Select None to show all resource types
          name: Exclude Resources
        name: exclude_resource
        plugin:
          kind: StaticListVariable
          spec:
            values:
            - label: None (exclude nothing)
              value: ^$
            - label: events
              value: events
            - label: endpoints
              value: endpoints
            - label: endpointslices
              value: endpointslices
            - label: leases
              value: leases
            - label: tokenreviews
              value: tokenreviews
            - label: subjectaccessreviews
              value: subjectaccessreviews
            - label: selfsubjectaccessreviews
              value: selfsubjectaccessreviews
            - label: selfsubjectrulesreviews
              value: selfsubjectrulesreviews
    - kind: TextVariable
      spec:
        display:
          description: Filter by user agent (e.g. oc, kubectl, console). Partial match,
            case-insensitive.
          name: Client
        name: client
        value: ''
    - kind: TextVariable
      spec:
        display:
          description: 'Raw LogQL stage. Examples: |~ "sradco" (include), !~ "sradco"
            (exclude), | user_username!~"sradco.*"'
          name: LogQL Filter
        name: filter
        value: '|~ ".*"'
